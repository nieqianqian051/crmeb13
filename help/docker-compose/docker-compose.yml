version: "3.3"
services:
  # mysql 容器
  mysql_pro:
    container_name: mysql_pro #指定容器名
    image: mysql:8.0 #MySQL 8.0 ARM64兼容镜像
    ports:
      - 3366:3306
    # 环境变量
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_USER: 'crmeb'
      MYSQL_PASSWORD: '123456'
      MYSQL_DATABASE: 'crmeb'
    privileged: true
    command:
       --character-set-server=utf8mb4
       --collation-server=utf8mb4_general_ci
       --explicit_defaults_for_timestamp=true
       --lower_case_table_names=1
       --max_allowed_packet=128M
       --default-authentication-plugin=mysql_native_password
       --sql-mode="STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"
    working_dir: /var/lib/mysql
    volumes:
      - ./mysql/my.cnf:/etc/mysql/my.cnf
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/data:/var/lib/mysql #挂载数据目录到本地
      - ./mysql/log:/var/log/mysql
    networks:
      app_net:
        # 固定子网ip，网段必须在子网络192.168.*.*
        ipv4_address: 172.28.0.13
  # redis 容器
  redis_pro:
    container_name: redis_pro
    image: 'redis:latest'
    ports:
      - "6399:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/data:/data #挂载数据目录到本地
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      app_net:
        ipv4_address: 172.28.0.14
  # php 容器
  crmeb_pro:
    container_name: crmeb_pro #指定容器名
    image: crmeb-pro #指定镜像名
    build:
      context: ./php #dockerfile文件路径
      dockerfile: Dockerfile #制定dockerfile文件名称
    restart: always
    environment:
      TZ: Asia/Shanghai
    ports:
      - 20199:20199
    tmpfs: /var/temp #上传临时文件夹
    working_dir: /var/www
    volumes:
      - ../../:/var/www #程序运行目录
      - ../../runtime:/var/www/runtime #程序缓存目录
      - ./php/php-ini-overrides.ini:/etc/php/8.0/fpm/conf.d/99-overrides.ini
    command: >
      sh -c "
        chmod -R 777 /var/www/public &&
        chmod -R 777 /var/www/runtime &&
        php think swoole
      "
    networks:
      app_net:
        ipv4_address: 172.28.0.15
networks: #网络配置
  app_net: #网络名称
    driver: bridge
    ipam: #网络配置
      driver: default
      config:
        - subnet: 172.28.0.0/24 #IP区间

